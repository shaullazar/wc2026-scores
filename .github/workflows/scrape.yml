name: WC 2026 Score Scraper
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install requests beautifulsoup4 -q
      - name: Run scraper
        run: python3 scrape_wc.py
      - name: Commit scores.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git stash
          git pull --rebase origin main
          git stash pop
          git add scores.json
          git diff --cached --quiet || git commit -m "Update WC scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
